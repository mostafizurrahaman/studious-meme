name: Deploy Malamal APIs to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-malamal-apis
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # ভ্যারিয়েবল ডিক্লেয়ারেশন
            APP_DIR="/var/www/MalaMal_APIs"
            APP_NAME="malamal-apis"

            echo "==> Updating system packages"
            sudo apt update -y
            sudo apt install -y git curl

            echo "==> Checking/Installing pnpm and pm2"
            if ! command -v pnpm >/dev/null 2>&1; then
              sudo npm install -g pnpm
            fi
            if ! command -v pm2 >/dev/null 2>&1; then
              sudo npm install -g pm2
            fi

            echo "==> Preparing app directory"
            sudo mkdir -p "$APP_DIR"
            sudo chown -R $USER:$USER "$APP_DIR"
            cd "$APP_DIR" || exit

            echo "==> Updating source code"
            if [ ! -d ".git" ]; then
              git clone -b main ${{ secrets.REPO_URL }} .
            else
              git remote set-url origin ${{ secrets.REPO_URL }}
              git fetch origin main
              git reset --hard origin/main
              git clean -fd
            fi

            echo "==> Creating .env file"
            cat <<EOF > .env
            ${{ secrets.ENV_FILE }}
            EOF

            echo "==> Installing dependencies and Building"
            pnpm install --frozen-lockfile
            pnpm build

            echo "==> Starting/Reloading with PM2"
            # জিরো ডাউনটাইম রিলোড (Zero Downtime)
            pm2 describe $APP_NAME > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "App is running. Reloading..."
              pm2 reload $APP_NAME
            else
              echo "App is not running. Starting new process..."
              # আপনার এন্ট্রি ফাইল যদি dist/main.js না হয় তবে সেটি এখানে পরিবর্তন করুন
              pm2 start dist/main.js --name "$APP_NAME"
            fi

            pm2 save
            echo "==> Backend deploy success without Nginx changes!"
            pm2 status
