name: Deploy Malamal APIs to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-malamal-apis
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 30m
          script_stop: true
          script: |
            export DEBIAN_FRONTEND=noninteractive

            REPO_URL="${{ secrets.REPO_URL }}"
            ENV_DATA='${{ secrets.ENV_FILE }}'
            DOMAIN_VAL="${{ secrets.VPS_DOMAIN }}"
            APP_DIR="/var/www/MalaMal_APIs"
            APP_NAME="malamal-apis"
            DEFAULT_PORT="5000"

            echo "==> Installing required packages"
            sudo apt update -y
            sudo apt install -y git nginx curl

            echo "==> Installing pnpm and pm2 if missing"
            if ! command -v pnpm >/dev/null 2>&1; then
              sudo npm install -g pnpm
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              sudo npm install -g pm2
            fi

            echo "==> Preparing app directory"
            sudo mkdir -p "$APP_DIR"
            sudo chown -R "$USER:$USER" "$APP_DIR"
            cd "$APP_DIR" || exit 1

            echo "==> Updating source code"
            echo "Current directory:"
            pwd

            echo "Listing current files:"
            ls -la

            if [ -z "$REPO_URL" ]; then
              echo "REPO_URL secret is empty"
              exit 1
            fi

            echo "Git version:"
            git --version

            echo "Testing repository access..."
            git ls-remote "$REPO_URL" > /dev/null

            if [ $? -ne 0 ]; then
              echo "Cannot access repository. Check REPO_URL token, username, repo name, or permissions."
              exit 1
            fi

            if [ -d ".git" ]; then
              echo "Existing git repo found. Pulling latest main..."
              git remote set-url origin "$REPO_URL"
              git fetch origin main
              git reset --hard origin/main
              git clean -fd
            else
              echo "Cloning fresh repo..."
              rm -rf ./* ./.??* 2>/dev/null || true
              git clone -b main "$REPO_URL" .
            fi

            echo "==> Creating .env file"
            printf "%s" "$ENV_DATA" > .env

            PORT_VAL=$(grep "^PORT=" .env | cut -d'=' -f2 | tr -d '"' | tr -d "'")
            if [ -z "$PORT_VAL" ]; then
              PORT_VAL="$DEFAULT_PORT"
              echo "PORT not found in .env, using default $PORT_VAL"
            else
              echo "Using PORT from .env: $PORT_VAL"
            fi

            echo "==> Installing dependencies"
            pnpm install --frozen-lockfile

            echo "==> Building app"
            pnpm build

            echo "==> Starting app with PM2"
            pm2 delete "$APP_NAME" 2>/dev/null || true
            pm2 start ecosystem.config.js --env production
            pm2 save

            if [ -n "$DOMAIN_VAL" ] && [ "$DOMAIN_VAL" != "***" ]; then
              echo "==> Configuring Nginx for $DOMAIN_VAL"

              NGINX_CONF="/etc/nginx/sites-available/$APP_NAME"

              sudo tee "$NGINX_CONF" > /dev/null <<EOF
            server {
                listen 80;
                server_name $DOMAIN_VAL;

                location / {
                    proxy_pass http://127.0.0.1:$PORT_VAL;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host \$host;
                    proxy_cache_bypass \$http_upgrade;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
            EOF

              sudo ln -sf "$NGINX_CONF" "/etc/nginx/sites-enabled/$APP_NAME"
              sudo rm -f /etc/nginx/sites-enabled/default

              echo "==> Testing and reloading Nginx"
              sudo nginx -t
              sudo systemctl reload nginx
            fi

            echo "==> Deploy success"
            pm2 status
