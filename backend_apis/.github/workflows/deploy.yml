name: Deploy to Hostinger VPS
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-malamal-apis
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 30m
          script_stop: true
          script: |
            export DEBIAN_FRONTEND=noninteractive

            # ভেরিয়েবল এসাইন করা
            REPO_URL="${{ secrets.REPO_URL }}"
            ENV_DATA='${{ secrets.ENV_FILE }}'
            DOMAIN_VAL="${{ secrets.VPS_DOMAIN }}"

            echo "==> Preparing Directory"
            sudo mkdir -p /var/www/MalaMal_APIs
            sudo chown -R $USER:$USER /var/www/MalaMal_APIs
            cd /var/www/MalaMal_APIs || exit 1

            echo "==> Updating Source Code"
            if [ -d ".git" ]; then
              git fetch origin main
              git reset --hard origin/main
            else
              rm -rf * .git 2>/dev/null || true
              git clone -b main "$REPO_URL" .
            fi

            echo "==> Creating .env file"
            echo "$ENV_DATA" > .env

            # .env ফাইল থেকে PORT খুঁজে বের করা
            PORT_VAL=$(grep "^PORT=" .env | cut -d'=' -f2)
            if [ -z "$PORT_VAL" ]; then 
              PORT_VAL=5000
              echo "PORT not found in .env, using default 5000"
            else
              echo "Using PORT from .env: $PORT_VAL"
            fi

            echo "==> Installing & Building"
            if ! command -v pnpm >/dev/null 2>&1; then sudo npm i -g pnpm; fi
            if ! command -v pm2 >/dev/null 2>&1; then sudo npm i -g pm2; fi

            pnpm install
            pnpm build

            echo "==> PM2 Service Start"
            # ecosystem.config.js ব্যবহার করে অ্যাপ চালানো
            pm2 delete malamal-apis 2>/dev/null || true
            pm2 start ecosystem.config.js
            pm2 save

            # Nginx Setup (WordPress নিরাপদ রেখে)
            if [ -n "$DOMAIN_VAL" ] && [ "$DOMAIN_VAL" != "***" ]; then
              echo "==> Configuring Nginx for $DOMAIN_VAL on port $PORT_VAL"
              NGINX_CONF="/etc/nginx/sites-available/malamal-apis"
              
              sudo tee "$NGINX_CONF" > /dev/null <<EOF
            server {
                listen 80;
                server_name $DOMAIN_VAL;

                location / {
                    proxy_pass http://127.0.0.1:$PORT_VAL;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host \$host;
                    proxy_cache_bypass \$http_upgrade;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Real-IP \$remote_addr;
                }
            }
            EOF
              
              sudo ln -sf "$NGINX_CONF" /etc/nginx/sites-enabled/
              
              echo "==> Testing and Reloading Nginx"
              sudo nginx -t && sudo systemctl reload nginx
            fi

            echo "==> DEPLOY SUCCESS!"
            pm2 status
