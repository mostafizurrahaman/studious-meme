name: Deploy Malamal Frontend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-malamal-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 30m
          script_stop: true
          script: |
            export DEBIAN_FRONTEND=noninteractive

            REPO_URL="${{ secrets.FRONTEND_REPO_URL }}"
            ENV_DATA='${{ secrets.FRONTEND_ENV_FILE }}'

            APP_DIR="/var/www/MalaMal_Frontend"
            APP_NAME="malamal-frontend"

            echo "==> Installing required packages"
            sudo apt update -y
            sudo apt install -y git curl

            echo "==> Installing pnpm and pm2 if missing"

            if ! command -v pnpm >/dev/null 2>&1; then
              sudo npm install -g pnpm
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              sudo npm install -g pm2
            fi

            echo "==> Preparing app directory"

            sudo mkdir -p "$APP_DIR"
            sudo chown -R "$USER:$USER" "$APP_DIR"

            cd "$APP_DIR" || exit 1

            echo "==> Updating source code"

            if [ -d ".git" ]; then
              git fetch origin main
              git reset --hard origin/main
              git clean -fd
            else
              rm -rf ./* ./.??* 2>/dev/null || true
              git clone -b main "$REPO_URL" .
            fi

            echo "==> Creating .env file"

            printf "%s" "$ENV_DATA" > .env

            echo "==> Installing dependencies"

            pnpm install --frozen-lockfile

            echo "==> Building Next.js app"

            pnpm build

            echo "==> Starting frontend with PM2"

            pm2 delete "$APP_NAME" 2>/dev/null || true

            pm2 start "pnpm start" \
              --name "$APP_NAME" \
              --cwd "$APP_DIR"

            pm2 save

            echo "==> Frontend deploy success"

            pm2 status
